<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoderClan</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup">
    <h2>CODERCLAN</h2>
    <button id="create-room">Create a Clan</button></br>
    <h3>or</h3>
    <button id="join">Join a Clan</button>
    <input id="room-id" placeholder="Enter Room ID"/></br>
    <div id="status"></div>
    <input type="number" id="timer-input" placeholder="Enter time in minutes" /></br>
    <button id="start-contest">Start Contest</button></br>
    <div id="timer">00:00:00</div></br>
  </div>
  <script src="popup.js"></script>
</body>
</html>
